<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIEHUB AGRI ACADEMY</title>
<!-- Installable app (PWA): manifest.json, sw.js and the icon-*.png files must be
     uploaded to GitHub Pages alongside this HTML file, in the same folder, for
     "Install app" to work. See the setup notes sent with this file. -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F6E4F">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<!-- Shared database (Firebase Firestore) — needed so every teammate, on every browser/device, sees the same data. See FIREBASE_CONFIG near the top of the main script block below for setup steps. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- HD certificate image export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Maps (OpenStreetMap via Leaflet — free, no API key required) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#F5F6F1;
    --surface:#FFFFFF;
    --surface-alt:#EDF1E9;
    --ink:#1E2A22;
    --ink-soft:#5C6B60;
    --primary:#2F6E4F;
    --primary-dark:#20503A;
    --primary-tint:#E3EEE7;
    --amber:#D98E2B;
    --amber-tint:#FBF0DD;
    --brown:#8B5E34;
    --danger:#B84C3E;
    --danger-tint:#F7E7E4;
    --border:#DDE3D9;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html{overflow-x:hidden;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;}
  h1,h2,h3,h4,.brand,.nav-label{font-family:'Manrope',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:inherit;}

  /* ---------- Login ---------- */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 2px 24px rgba(30,42,34,0.06);}
  .login-mark{width:44px;height:44px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-family:'Manrope';margin-bottom:18px;}
  .login-card h1{font-size:22px;margin:0 0 4px;}
  .login-card p.sub{color:var(--ink-soft);margin:0 0 26px;font-size:14px;}
  .role-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);text-align:left;font-size:14px;font-weight:600;color:var(--ink);transition:.15s;}
  .role-btn:hover{border-color:var(--primary);background:var(--primary-tint);}
  .role-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;}
  .login-back{background:none;border:none;color:var(--ink-soft);font-size:13px;margin-bottom:16px;padding:0;text-decoration:underline;}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}

  /* ---------- Shell ---------- */
  #app-shell{display:none;min-height:100vh;}
  .sidebar{width:230px;flex-shrink:0;background:var(--primary-dark);color:#EAF1EC;min-height:100vh;padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sidebar .brand{color:#fff;font-weight:800;font-size:16px;padding:6px 10px 20px;line-height:1.25;}
  .sidebar .brand small{display:block;font-family:'Inter';font-weight:500;font-size:11px;color:#A9C4B4;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:600;color:#CFE0D5;margin-bottom:2px;}
  .nav-item:hover{background:rgba(255,255,255,0.06);cursor:pointer;}
  .nav-item.active{background:#fff;color:var(--primary-dark);}
  .nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#7FA491;margin:18px 10px 6px;}
  .sidebar-footer{margin-top:24px;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.12);}
  .who{font-size:13px;font-weight:700;color:#fff;}
  .who-role{font-size:11px;color:#9FC2AC;margin-bottom:8px;}
  .switch-btn{font-size:12px;color:#CFE0D5;background:rgba(255,255,255,0.08);border:none;padding:6px 10px;border-radius:6px;width:100%;text-align:left;}
  .switch-btn:hover{background:rgba(255,255,255,0.16);}

  .main{flex:1;min-width:0;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;flex-wrap:wrap;gap:10px;}
  .topbar h2{margin:0;font-size:18px;}
  .topbar .sub{color:var(--ink-soft);font-size:12.5px;margin-top:2px;}
  .content{padding:26px 28px 60px;max-width:1180px;}

  /* ---------- Common bits ---------- */
  .btn{border-radius:8px;border:1px solid var(--border);background:var(--surface);padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--ink);}
  .btn:hover{border-color:var(--primary);}
  .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-danger{background:var(--danger-tint);border-color:var(--danger-tint);color:var(--danger);}
  .btn-sm{padding:6px 10px;font-size:12.5px;}
  .row-actions{display:flex;gap:8px;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .stat-card .n{font-family:'Manrope';font-size:26px;font-weight:800;color:var(--primary-dark);}
  .stat-card .l{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:2px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px;}
  .card h3{margin:0 0 14px;font-size:14.5px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .card-head h3{margin:0;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .empty-row{padding:30px 10px;text-align:center;color:var(--ink-soft);font-size:13px;}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-green{background:var(--primary-tint);color:var(--primary-dark);}
  .badge-amber{background:var(--amber-tint);color:#8A5A10;}
  .badge-grey{background:#EDEEEA;color:#6B7268;}
  .badge-red{background:var(--danger-tint);color:var(--danger);}

  .growth-track{display:flex;gap:3px;width:46px;}
  .growth-track span{flex:1;height:5px;border-radius:3px;background:#E3E7DF;}
  .growth-track.s1 span:nth-child(1){background:var(--amber);}
  .growth-track.s2 span:nth-child(1),.growth-track.s2 span:nth-child(2){background:var(--primary);}
  .growth-track.s3 span{background:var(--primary-dark);}
  .growth-track.s0 span{background:#D8D1CB;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;}
  .tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;cursor:pointer;}
  .tab.active{color:var(--primary-dark);border-color:var(--primary);}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{margin-bottom:2px;}
  .form-group.full{grid-column:1/-1;}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;background:#fff;color:var(--ink);}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--primary);outline-offset:0;border-color:var(--primary);}
  .checklist{border:1px solid var(--border);border-radius:8px;padding:10px 12px;max-height:200px;overflow-y:auto;}
  .checklist label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:5px 2px;color:var(--ink);}
  .checklist .parish-sub{margin-left:22px;padding-left:10px;border-left:2px solid var(--border);margin-bottom:6px;}
  .benefit-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
  .benefit-row:last-child{border-bottom:none;}
  .benefit-name{font-weight:600;font-size:13.5px;}
  .benefit-name small{display:block;font-weight:400;color:var(--ink-soft);font-size:11.5px;margin-top:2px;}
  .toggle{position:relative;width:38px;height:22px;flex-shrink:0;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle .track{position:absolute;inset:0;background:#D8DDD3;border-radius:20px;transition:.15s;}
  .toggle .track:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
  .toggle input:checked + .track{background:var(--primary);}
  .toggle input:checked + .track:before{transform:translateX(16px);}

  .benefit-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
  .benefit-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .benefit-card.off{opacity:.45;}
  .benefit-card .amt{font-family:'Manrope';font-size:20px;font-weight:800;color:var(--primary-dark);margin-top:6px;}
  .benefit-card .tag{font-size:11px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
  .empty-state .em-title{font-weight:700;color:var(--ink);margin-bottom:4px;font-size:14.5px;}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,28,22,0.45);align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;padding:26px 26px 22px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .modal-head h3{margin:0;font-size:16.5px;}
  .modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);line-height:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  .search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .search-bar input,.search-bar select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;}
  .search-bar input{flex:1;min-width:180px;}

  .msg-item{padding:14px 0;border-bottom:1px solid var(--border);}
  .msg-item:last-child{border-bottom:none;}
  .msg-top{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:3px;}
  .msg-subject{font-weight:700;font-size:13.5px;margin-bottom:3px;}
  .msg-body{font-size:13px;color:var(--ink);line-height:1.5;}
  .msg-unread .msg-subject:before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--amber);margin-right:6px;}

  .toast{position:fixed;bottom:22px;right:22px;background:var(--primary-dark);color:#fff;padding:12px 18px;border-radius:8px;font-size:13.5px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:99;display:none;}

  @media (max-width:820px){
    #app-shell{flex-direction:column;}
    .sidebar{width:100%;height:auto;position:relative;min-height:auto;display:flex;flex-wrap:wrap;gap:4px;padding:14px;}
    .sidebar .brand{width:100%;padding-bottom:10px;}
    .sidebar-footer{width:100%;}
    .form-grid{grid-template-columns:1fr;}
    .content{padding:18px;}
  }
  /* ---------- Avatars ---------- */
  .avatar{border-radius:50%;object-fit:cover;background:var(--primary-tint);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--primary-dark);flex-shrink:0;font-family:'Manrope';}
  .avatar-lg{width:76px;height:76px;font-size:26px;}
  .avatar-sm{width:34px;height:34px;font-size:13px;}
  .avatar-xs{width:24px;height:24px;font-size:10.5px;}
  .avatar-upload-wrap{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap;}
  .avatar-upload-wrap input[type=file]{font-size:12px;max-width:180px;}
  .login-mark img{width:100%;height:100%;object-fit:cover;border-radius:10px;}

  /* ---------- Topbar extras: hamburger + bell ---------- */
  .hamburger-btn{display:none;background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;align-items:center;justify-content:center;font-size:16px;margin-right:10px;}
  .topbar-left{display:flex;align-items:center;}
  .bell-btn{position:relative;background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:15px;display:inline-flex;align-items:center;justify-content:center;}
  .bell-dot{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:19;}
  .sidebar-overlay.open{display:block;}

  /* ---------- Password / auth ---------- */
  .login-error{background:var(--danger-tint);color:var(--danger);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:12px;}
  .pass-hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
  .storage-ok{background:var(--primary-tint);color:var(--primary-dark);font-size:12px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:16px;line-height:1.5;}
  .storage-warn{background:var(--amber-tint);color:#8A5A10;font-size:12px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:16px;line-height:1.5;}
  .install-banner{position:fixed;left:14px;right:14px;bottom:14px;max-width:520px;margin:0 auto;background:var(--primary-dark);color:#fff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;z-index:60;box-shadow:0 8px 28px rgba(0,0,0,0.22);font-size:13px;}
  .install-banner-actions{display:flex;gap:8px;flex-shrink:0;}
  .install-banner .btn{border-color:transparent;}
  .install-banner .btn:not(.btn-primary){background:rgba(255,255,255,0.12);color:#fff;}

  /* ---------- Color swatch input ---------- */
  .color-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .color-row input[type=color]{width:44px;height:36px;border:1px solid var(--border);border-radius:8px;padding:2px;background:#fff;}

  @media (max-width:820px){
    .hamburger-btn{display:inline-flex;}
    .sidebar{position:fixed;left:0;top:0;bottom:0;height:100vh;width:250px;z-index:20;transform:translateX(-105%);transition:transform .2s ease;display:flex;flex-direction:column;flex-wrap:nowrap;}
    .sidebar.open{transform:translateX(0);}
  }
  @media (max-width:480px){
    .login-card{padding:28px 22px;}
    .content{padding:14px;}
    .topbar{padding:12px 14px;}
    .card{padding:14px 16px;}
    .stat-card .n{font-size:22px;}
    .modal{padding:20px 16px 16px;}
    table{font-size:12.5px;}
    th,td{padding:8px 6px;}
  }
  /* Mobile-friendly: iOS/Android auto-zoom on input focus if font-size is under 16px —
     keep all form controls at 16px on touch-sized screens so nobody has to pinch-zoom. */
  @media (max-width:820px){
    .form-group input,.form-group select,.form-group textarea,
    .search-bar input,.search-bar select,
    #org-login-pw,#trainer-login-pw,#trainer-login-select,
    .checklist label{font-size:16px;}
    .btn{padding:11px 16px;font-size:14px;}
    .btn-sm{padding:9px 12px;font-size:13px;}
    h1{font-size:20px;}
    .topbar h2{font-size:16px;}
    table{font-size:13px;}
    .role-btn{padding:16px;}
  }

  /* ---------- Print ---------- */
  @media print{
    .sidebar,.topbar,.btn,.search-bar,.tabs,.modal-overlay,.toast,.sidebar-overlay,.row-actions,.hamburger-btn,.bell-btn{display:none !important;}
    .content{padding:0;max-width:100%;}
    .card{border:none;box-shadow:none;padding:0;margin-bottom:22px;}
    body{background:#fff;}
  }
  @media print{
    body.printing-certificate .sidebar,body.printing-certificate .topbar,body.printing-certificate .toast{display:none !important;}
    body.printing-certificate .modal-overlay{display:flex !important;position:static !important;background:none !important;padding:0 !important;}
    body.printing-certificate .modal{box-shadow:none;max-width:100%;max-height:none;overflow:visible;padding:0;}
    body.printing-certificate .cert-actions{display:none !important;}
    body.printing-certificate .modal-close{display:none !important;}
    body.printing-certificate .modal-head{display:none !important;}
  }

  /* ---------- Certificate ---------- */
  .cert-frame{border:3px solid var(--primary);padding:10px;border-radius:4px;background:#fff;}
  .cert-inner{border:1.5px solid var(--amber);border-radius:2px;padding:40px 36px;text-align:center;position:relative;}
  .cert-kicker{font-family:'Manrope';font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--primary-dark);font-weight:800;margin-bottom:6px;}
  .cert-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;color:var(--ink);margin:0 0 18px;letter-spacing:.02em;}
  .cert-body-text{font-size:13.5px;color:var(--ink-soft);}
  .cert-name{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;color:var(--primary-dark);margin:14px 0;border-bottom:1.5px solid var(--amber);display:inline-block;padding:0 20px 8px;}
  .cert-field{font-size:15px;font-weight:700;color:var(--ink);margin:10px 0 4px;}
  .cert-meta{display:flex;justify-content:space-around;margin-top:34px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;gap:16px;}
  .cert-meta div{border-top:1px solid var(--border);padding-top:8px;min-width:140px;}
  .cert-seal{width:64px;height:64px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Manrope';font-weight:800;font-size:12px;margin:0 auto 14px;border:3px solid var(--amber-tint);}
  .cert-logo-img{max-height:64px;max-width:220px;object-fit:contain;margin:0 auto 14px;display:block;}
  .cert-id{font-size:10px;color:var(--ink-soft);margin-top:24px;letter-spacing:.03em;}
  #locations-map{width:100%;height:60vh;min-height:360px;border-radius:var(--radius);border:1px solid var(--border);}
  .map-offline-note{font-size:12px;color:var(--ink-soft);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-screen">
  <div class="login-card" id="login-card-inner">
    <!-- rendered by JS -->
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div id="app-shell" style="display:flex;">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger-btn" onclick="toggleSidebar()">&#9776;</button>
        <div>
          <h2 id="topbar-title">Dashboard</h2>
          <div class="sub" id="topbar-sub"></div>
        </div>
      </div>
      <div id="topbar-right" style="display:flex;align-items:center;gap:10px;">
        <button class="bell-btn" onclick="goToCorrespondence()" title="Messages">&#128276;<span class="bell-dot" id="bell-dot" style="display:none;">0</span></button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   NIEHUB AGRI ACADEMY — data management app
   Data persists via window.storage (shared across all users)

/* ============================================================
   SHARED DATABASE SETUP (Firebase Firestore)
   ------------------------------------------------------------
   GitHub Pages (and any plain static host) can only serve files —
   it cannot store data anywhere. Without a real database, every
   visitor's browser keeps its own private, disconnected copy of
   the data, which is why teammates could not see each other's
   records. Firestore fixes this: everyone's browser reads/writes
   the same cloud database.

   TO ENABLE (free, ~5 minutes):
   1. Go to https://console.firebase.google.com → "Add project" (name it anything, e.g. "niehub-agri-academy").
   2. In the left menu: Build → Firestore Database → "Create database" → start in TEST MODE → choose any region.
   3. Click the gear icon (Project settings) → scroll to "Your apps" → click the </> (Web) icon → register the app (nickname anything, no hosting needed).
   4. Firebase will show a `firebaseConfig` object — copy those values into FIREBASE_CONFIG below.
   5. Re-upload this file to GitHub Pages. Reload the page — the "Local device only" warning
      on the login screen should disappear once it's connected.

   Test-mode Firestore rules are open to anyone with the project's config, which is fine for
   an internal team tool but not for sensitive data. If you want it locked down, in Firestore →
   Rules, you can restrict access further (ask your developer, or ask me for help with this).
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDX8Sdm0DEV2GnLGlNEkJ2H3d_A6pyHDTM",
  authDomain: "niehub-agri-academy.firebaseapp.com",
  projectId: "niehub-agri-academy",
  storageBucket: "niehub-agri-academy.firebasestorage.app",
  messagingSenderId: "74277018827",
  appId: "1:74277018827:web:94d69069df48b7b4048f4e"
};
let fireDb = null;
let HAS_FIREBASE = false;
try{
  if(FIREBASE_CONFIG.apiKey && typeof firebase !== 'undefined'){
    firebase.initializeApp(FIREBASE_CONFIG);
    fireDb = firebase.firestore();
    HAS_FIREBASE = true;
  }
}catch(e){ console.error('Firebase init failed', e); }

// Uses the Claude artifact storage API when available (live preview inside Claude).
const HAS_ARTIFACT_STORAGE = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');

// Storage priority for org-wide (shared) data: Firestore (real cross-device database) →
// Claude artifact storage (only exists inside the Claude.ai preview) → localStorage
// (last resort — this device only, kept so the app still works before Firebase is configured).
// Personal, per-device data (the login session) intentionally always stays local.
async function sGet(key, shared){
  if(shared && HAS_FIREBASE){
    try{
      const snap = await fireDb.collection('niehub_data').doc(key).get();
      return snap.exists ? JSON.parse(snap.data().value) : null;
    }catch(e){ console.error('Firestore get failed', key, e); }
  }
  if(HAS_ARTIFACT_STORAGE){
    try{
      const r = await window.storage.get(key, shared);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem('niehub__'+key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function sSet(key, value, shared){
  if(shared && HAS_FIREBASE){
    try{ await fireDb.collection('niehub_data').doc(key).set({ value: JSON.stringify(value), updatedAt: Date.now() }); return; }
    catch(e){ console.error('Firestore set failed', key, e); }
  }
  if(HAS_ARTIFACT_STORAGE){
    try{ await window.storage.set(key, JSON.stringify(value), shared); return; }
    catch(e){ console.error('storage set failed', key, e); }
  }
  try{ localStorage.setItem('niehub__'+key, JSON.stringify(value)); }
  catch(e){ console.error('local storage set failed', key, e); }
}

async function persist(key){ await sSet(key, DB[key], true); }
async function persistSession(){ await sSet('session', session, false); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.style.display='none'; }, 2600);
}

/* ---------------- Boot ---------------- */
async function boot(){
  const loaded = await Promise.all([
    sGet('niehubers', true), sGet('niehubees', true), sGet('districts', true),
    sGet('parishes', true), sGet('payments', true), sGet('messages', true), sGet('session', false),
    sGet('otherPayees', true), sGet('orgSettings', true),
    sGet('loginLogs', true), sGet('trainingSessions', true), sGet('materials', true), sGet('certificates', true)
  ]);
  DB.niehubers = loaded[0] || [];
  DB.niehubees = loaded[1] || [];
  DB.districts = loaded[2] || DEFAULT_DISTRICTS.map(name=>({id:uid('dist'), name}));
  DB.parishes  = loaded[3] || [];
  DB.payments  = loaded[4] || [];
  DB.messages  = loaded[5] || [];
  DB.otherPayees = loaded[7] || [];
  DB.orgSettings = Object.assign({}, DEFAULT_ORG_SETTINGS, loaded[8] || {});
  DB.loginLogs = loaded[9] || [];
  DB.trainingSessions = loaded[10] || [];
  DB.materials = loaded[11] || [];
  DB.certificates = loaded[12] || [];
  if(!loaded[2]) await persist('districts');
  if(!loaded[8]) await persist('orgSettings');
  // Backfill defaults for any NIEHUBer registered before password support existed
  let needsSave = false;
  DB.niehubers.forEach(t=>{ if(!t.password){ t.password = '2026'; needsSave = true; } });
  if(needsSave) await persist('niehubers');
  // Migrate NIEHUBees from the old single fieldOfStudy/status to the new multi-programme model
  let traineesMigrated = false;
  DB.niehubees.forEach(t=>{
    if(!t.programs){
      t.programs = t.fieldOfStudy ? [{ field: t.fieldOfStudy, status: t.status || 'Enrolled' }] : [];
      traineesMigrated = true;
    }
  });
  if(traineesMigrated) await persist('niehubees');
  applyAppearance();

  const savedSession = loaded[6];
  if(savedSession && savedSession.role==='org'){
    session = savedSession; showApp();
  } else if(savedSession && savedSession.role==='trainer' && DB.niehubers.find(t=>t.id===savedSession.trainerId)){
    session = savedSession; showApp();
  } else {
    renderLogin('choose');
  }
  startMessagePolling();
}
boot();

function applyAppearance(){

  // embed build declares the same vars on .niehub-app-scope instead — target

function shadeColor(hex, percent){
  try{
    let [r,g,b] = hex.replace('#','').match(/.{2}/g).map(h=>parseInt(h,16));
    const amt = Math.round(2.55*percent);
    r = Math.min(255,Math.max(0,r+amt)); g = Math.min(255,Math.max(0,g+amt)); b = Math.min(255,Math.max(0,b+amt));
    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
  }catch(e){ return hex; }
}

// Reads an <input type=file>, downsizes the image to keep storage small, returns a dataURL via callback
function handlePhotoInput(inputEl, callback){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxDim = 220;
      let w = img.width, h = img.height;
      if(w > h){ if(w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
      else { if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Reads any small file (not just images) as a base64 dataURL, with a size guard.
// maxKB keeps things well under Firestore's 1MB-per-document ceiling.
function handleFileInput(inputEl, maxKB, callback){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  if(file.size > maxKB*1024){
    toast(`File is too large — please keep it under ${maxKB}KB`);
    inputEl.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => callback({ name: file.name, data: ev.target.result, size: file.size });
  reader.readAsDataURL(file);
}

/* ---------------- Correspondence: unread tracking, bell & sound ---------------- */
function viewerKey(){ return session.role==='org' ? 'org' : session.trainerId; }
function unreadFor(viewer){
  if(!viewer) return 0;
  return DB.messages.filter(m => (m.to===viewer || m.to==='ALL') && m.from!==viewer && !(m.readBy||[]).includes(viewer)).length;
}
function updateBell(){
  const dot = document.getElementById('bell-dot');
  if(!dot) return;
  const n = unreadFor(viewerKey());
  dot.style.display = n>0 ? 'flex' : 'none';
  dot.textContent = n>9 ? '9+' : n;
}
function markMessagesReadForViewer(viewer){
  let changed = false;
  DB.messages.forEach(m=>{
    if((m.to===viewer || m.to==='ALL') && m.from!==viewer){
      m.readBy = m.readBy || [];
      if(!m.readBy.includes(viewer)){ m.readBy.push(viewer); changed = true; }
    }
  });
  if(changed) persist('messages');
  updateBell();
}
function goToCorrespondence(){ navigate(session.role==='org' ? 'org-correspondence' : 'trainer-correspondence'); }
function playNotifySound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.setValueAtTime(1180, ctx.currentTime+0.11);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+0.36);
  }catch(e){ /* audio not available */ }
}
let __lastUnreadCount = 0;
function startMessagePolling(){
  __lastUnreadCount = unreadFor(viewerKey());
  updateBell();
  setInterval(async ()=>{
    if(!session.role) return;
    const fresh = await sGet('messages', true);
    if(fresh){ DB.messages = fresh; }
    const n = unreadFor(viewerKey());
    if(n > __lastUnreadCount){ playNotifySound(); }
    __lastUnreadCount = n;
    updateBell();
  }, 12000);
}

/* ---------------- Export & print ---------------- */
function exportCSV(filename, headers, rows){
  const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const csv = [headers.map(esc).join(','), ...rows.map(r=>r.map(esc).join(','))].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename.endsWith('.csv') ? filename : filename+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

/* ---------------- Login activity: device + approximate location ---------------- */
function parseDevice(ua){
  ua = ua || navigator.userAgent;
  let os = 'Unknown OS';
  if(/iPhone|iPad|iPod/.test(ua)) os = 'iOS';
  else if(/Android/.test(ua)) os = 'Android';
  else if(/Windows/.test(ua)) os = 'Windows';
  else if(/Mac OS X/.test(ua)) os = 'macOS';
  else if(/Linux/.test(ua)) os = 'Linux';
  let browser = 'Unknown browser';
  if(/Edg\//.test(ua)) browser = 'Edge';
  else if(/OPR\//.test(ua)) browser = 'Opera';
  else if(/Chrome\//.test(ua) && !/Chromium/.test(ua)) browser = 'Chrome';
  else if(/Safari\//.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if(/Firefox\//.test(ua)) browser = 'Firefox';
  const deviceType = /Mobi|Android|iPhone|iPad/.test(ua) ? (/iPad/.test(ua)?'Tablet':'Mobile') : 'Desktop';
  return { os, browser, deviceType };
}
async function recordLogin(viewerType, trainerId){
  const { os, browser, deviceType } = parseDevice();
  const now = new Date();
  const entry = {
    id: uid('log'), viewerType, trainerId,
    date: now.toISOString().slice(0,10), time: now.toTimeString().slice(0,5),
    os, browser, deviceType, city:'', region:'', country:''
  };
  try{
    const resp = await fetch('https://ipapi.co/json/');
    if(resp.ok){
      const geo = await resp.json();
      entry.city = geo.city || ''; entry.region = geo.region || ''; entry.country = geo.country_name || '';
      entry.ip = geo.ip || '';
    }
  }catch(e){ /* offline or blocked — location stays blank, login still recorded */ }
  DB.loginLogs.push(entry);
  if(DB.loginLogs.length > 500) DB.loginLogs = DB.loginLogs.slice(-500); // keep it bounded
  persist('loginLogs');
}

/* ---------------- Text safety + clickable links ---------------- */
// Escapes user-entered text before it goes into innerHTML, then turns any
// http(s)/www links inside it into real clickable <a> tags.
function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function linkify(str){
  const escaped = escapeHtml(str);
  return escaped.replace(/((https?:\/\/|www\.)[^\s<]+)/g, (match)=>{
    const href = match.startsWith('http') ? match : 'https://'+match;
    return `<a href="${href}" target="_blank" rel="noopener noreferrer">${match}</a>`;
  });
}

function traineeRow(t){
  const trainer = DB.niehubers.find(x=>x.id===t.trainerId);
  const d = DB.districts.find(x=>x.id===t.districtId);
  return `<tr>
    <td>${t.name}</td>
    <td>${programChips(t.programs)}</td>
    <td>${trainer?trainer.name:'—'}</td>
    <td>${d?d.name:'—'}</td>
  </tr>`;
}

function statusBadge(status){
  const map = {'Enrolled':'badge-amber','In Training':'badge-green','Graduated':'badge-green','Dropped':'badge-red'};
  return `<span class="badge ${map[status]||'badge-grey'}">${status}</span>`;
}
// A NIEHUBee can now be enrolled in more than one field of study at once,
// each progressing independently — show one compact chip per programme.
function programChips(programs){
  if(!programs || !programs.length) return '<span style="color:var(--ink-soft);font-size:12px;">No programme yet</span>';
  return programs.map(p => `<span class="badge ${{'Enrolled':'badge-amber','In Training':'badge-green','Graduated':'badge-green','Dropped':'badge-red'}[p.status]||'badge-grey'}" style="margin:2px 4px 2px 0;">${p.field}: ${p.status}</span>`).join('');
}

function renderLocationPicker(){
  return DB.districts.map(d=>{
    const checked = pick.districtIds.includes(d.id);
    const parishes = DB.parishes.filter(p=>p.districtId===d.id);
    return `
      <label><input type="checkbox" onchange="pickDistrict('${d.id}', this.checked)" ${checked?'checked':''}> ${d.name}</label>
      ${checked && parishes.length ? `<div class="parish-sub">${parishes.map(p=>`
        <label><input type="checkbox" onchange="pickParish('${p.id}', this.checked)" ${pick.parishIds.includes(p.id)?'checked':''}> ${p.name}</label>
      `).join('')}</div>` : ''}
    `;
  }).join('') || '<div style="font-size:13px;color:var(--ink-soft);">No districts yet — add some under Districts &amp; Parishes.</div>';
}
function pickDistrict(id, checked){
  if(checked){ if(!pick.districtIds.includes(id)) pick.districtIds.push(id); }
  else { pick.districtIds = pick.districtIds.filter(x=>x!==id); pick.parishIds = pick.parishIds.filter(pid => DB.parishes.find(p=>p.id===pid)?.districtId !== id); }
  document.getElementById('tf-location-picker').innerHTML = renderLocationPicker();
}
function pickParish(id, checked){
  if(checked){ if(!pick.parishIds.includes(id)) pick.parishIds.push(id); }
  else{ pick.parishIds = pick.parishIds.filter(x=>x!==id); }
}

function saveTrainer(e){
  e.preventDefault();
  const fields = [...document.querySelectorAll('.tf-field:checked')].map(x=>x.value);
  const data = {
    name: document.getElementById('tf-name').value.trim(),
    phone: document.getElementById('tf-phone').value.trim(),
    email: document.getElementById('tf-email').value.trim(),
    gender: document.getElementById('tf-gender').value,
    baseSalary: Number(document.getElementById('tf-salary').value)||0,
    fieldsOfStudy: fields,
    districtIds: [...pick.districtIds],
    parishIds: [...pick.parishIds],
    photo: window.__tfPhoto || null,
  };
  if(editingTrainerId){
    const t = DB.niehubers.find(x=>x.id===editingTrainerId);
    Object.assign(t, data);
    toast('NIEHUBer updated');
  } else {
    DB.niehubers.push({
      id: uid('tr'), ...data, status:'active', dateJoined: new Date().toISOString().slice(0,10),
      momoNumber:'', momoName:'', password:'2026',
      benefits: { trainingAllowance:{on:false,amount:0}, airtime:{on:false,amount:0}, dataBundle:{on:false,amount:0} }
    });
    toast('NIEHUBer registered — default password is 2026');
  }
  persist('niehubers');
  closeModal();
  renderTrainerTable();
  return false;
}

function renderMessages(viewer){
  const wrap = document.getElementById('msg-wrap');
  let list;
  if(viewer==='org') list = DB.messages;
  else list = DB.messages.filter(m => m.to===viewer || m.to==='ALL' || m.from===viewer);
  list = [...list].sort((a,b)=>b.date.localeCompare(a.date));
  window.__msgViewer = viewer;
  wrap.innerHTML = list.length ? list.map(m=>{
    const fromLabel = m.from==='org' ? 'Organization' : (DB.niehubers.find(t=>t.id===m.from)?.name || 'NIEHUBer');
    const toLabel = m.to==='org' ? 'Organization' : m.to==='ALL' ? 'All NIEHUBers' : (DB.niehubers.find(t=>t.id===m.to)?.name || 'NIEHUBer');
    const isUnread = viewer && (m.to===viewer || m.to==='ALL') && m.from!==viewer && !(m.readBy||[]).includes(viewer);
    return `<div class="msg-item ${isUnread?'msg-unread':''}" style="cursor:pointer;" onclick="openMessageView('${m.id}')">
      <div class="msg-top"><span>${escapeHtml(fromLabel)} → ${escapeHtml(toLabel)}</span><span>${m.date}</span></div>
      <div class="msg-subject">${escapeHtml(m.subject)}</div>
      <div class="msg-body" style="max-height:40px;overflow:hidden;">${linkify(m.body)}</div>
      ${m.attachment ? `<div style="margin-top:6px;font-size:12px;color:var(--ink-soft);">📎 ${escapeHtml(m.attachment.name)}</div>` : ''}
      </div>`;
  }).join('') : emptyState('No messages yet','Send an announcement or message to get started.');
}
function openMessageView(id){
  const m = DB.messages.find(x=>x.id===id);
  const viewer = window.__msgViewer;
  const fromLabel = m.from==='org' ? 'Organization' : (DB.niehubers.find(t=>t.id===m.from)?.name || 'NIEHUBer');
  const toLabel = m.to==='org' ? 'Organization' : m.to==='ALL' ? 'All NIEHUBers' : (DB.niehubers.find(t=>t.id===m.to)?.name || 'NIEHUBer');
  const canReply = m.from !== viewer; // no point replying to your own message
  const replyTarget = m.from === 'org' ? null : m.from; // who to reply TO
  openModal(escapeHtml(m.subject), `
    <div class="msg-top" style="margin-bottom:10px;"><span>${escapeHtml(fromLabel)} → ${escapeHtml(toLabel)}</span><span>${m.date}</span></div>
    <div class="msg-body" style="font-size:14px;line-height:1.6;">${linkify(m.body)}</div>
    ${m.attachment ? `<button class="btn btn-sm" style="margin-top:12px;" onclick="downloadDataUrl('${m.attachment.data}','${(m.attachment.name||'file').replace(/'/g,"")}')">📎 Download ${escapeHtml(m.attachment.name)}</button>` : ''}
    <div class="modal-actions">
      <button type="button" class="btn" onclick="closeModal()">Close</button>
      ${canReply ? `<button type="button" class="btn btn-primary" onclick="replyToMessage('${m.id}')">Reply</button>` : ''}
    </div>
  `);
}
function replyToMessage(id){
  const m = DB.messages.find(x=>x.id===id);
  const fromRole = session.role==='org' ? 'org' : 'trainer';
  const replyTo = m.from==='org' ? 'org' : m.from;
  openComposeForm(fromRole, { to: replyTo, subject: 'Re: '+m.subject, parentId: m.id });
}
function openComposeForm(fromRole, prefill){
  const isOrg = fromRole==='org';
  const toOptions = isOrg
    ? `<option value="ALL">All NIEHUBers</option>${DB.niehubers.map(t=>`<option value="${t.id}" ${prefill&&prefill.to===t.id?'selected':''}>${t.name}</option>`).join('')}`
    : `<option value="org">Organization</option>`;
  openModal(prefill ? 'Reply' : 'New Message', `
    <form onsubmit="return sendMessage(event,'${fromRole}', ${prefill&&prefill.parentId?`'${prefill.parentId}'`:'null'})">
      <div class="form-grid">
        <div class="form-group full"><label>To</label><select id="mf-to">${toOptions}</select></div>
        <div class="form-group full"><label>Subject</label><input required id="mf-subject" value="${prefill?escapeHtml(prefill.subject):''}"></div>
        <div class="form-group full"><label>Message</label><textarea required id="mf-body" rows="4"></textarea></div>
        <div class="form-group full"><label>Attach a small file (optional, under 500KB)</label><input type="file" id="mf-file"></div>
      </div>
      <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Send</button></div>
    </form>
  `);
}
function sendMessage(e, fromRole, parentId){
  e.preventDefault();
  const from = fromRole==='org' ? 'org' : session.trainerId;
  const finish = (attachment) => {
    DB.messages.push({
      id: uid('msg'), from, to: document.getElementById('mf-to').value,
      subject: document.getElementById('mf-subject').value.trim(),
      body: document.getElementById('mf-body').value.trim(),
      date: new Date().toISOString().slice(0,10), readBy:[from],
      attachment: attachment || null, parentId: parentId || null
    });
    persist('messages'); closeModal();
    if(fromRole==='org') renderMessages('org'); else renderMessages(session.trainerId);
    updateBell();
    toast('Message sent');
  };
  const fileInput = document.getElementById('mf-file');
  if(fileInput.files && fileInput.files[0]){
    handleFileInput(fileInput, 500, (res)=> finish({ name: res.name, data: res.data }));
  } else {
    finish(null);
  }
  return false;
}

function renderCheckinWidget(){
  const t = currentTrainer();
  const active = DB.trainingSessions.find(s=>s.trainerId===t.id && !s.checkOut);
  const wrap = document.getElementById('checkin-widget');
  if(!wrap) return;
  if(active){
    const started = new Date(active.checkIn);
    wrap.innerHTML = `
      <h3 style="margin-bottom:6px;">Training session in progress</h3>
      <p style="font-size:13px;color:var(--ink-soft);margin:0 0 14px;">Checked in for <strong>${active.fieldOfStudy}</strong> at ${started.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} on ${started.toLocaleDateString()}.</p>
      <button class="btn btn-primary" onclick="checkOutTraining('${active.id}')">Check Out</button>
    `;
  } else {
    wrap.innerHTML = `
      <h3 style="margin-bottom:6px;">Start a training session</h3>
      <p style="font-size:13px;color:var(--ink-soft);margin:0 0 14px;">Check in when you begin training so the organization can see how long each session runs.</p>
      <div class="form-grid" style="margin-bottom:12px;">
        <div class="form-group"><label>Field of study</label><select id="ci-field">${FIELDS.map(f=>`<option>${f}</option>`).join('')}</select></div>
        <div class="form-group"><label>Note (optional)</label><input id="ci-note" placeholder="e.g. Group of 12 at Bulenga site"></div>
      </div>
      <button class="btn btn-primary" onclick="checkInTraining()">Check In</button>
    `;
  }
}
function checkInTraining(){
  const t = currentTrainer();
  const btn = document.querySelector('#checkin-widget .btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = 'Getting your location…'; }
  const finish = (coords) => {
    DB.trainingSessions.push({
      id: uid('ses'), trainerId: t.id,
      fieldOfStudy: document.getElementById('ci-field').value,
      note: document.getElementById('ci-note').value.trim(),
      checkIn: new Date().toISOString(), checkOut: null, durationMinutes: null,
      lat: coords ? coords.lat : null, lng: coords ? coords.lng : null, gpsAccuracy: coords ? coords.accuracy : null
    });
    persist('trainingSessions'); renderCheckinWidget(); renderMySessionsTable();
    toast(coords ? 'Checked in with GPS location' : 'Checked in (location not captured)');
  };
  if('geolocation' in navigator){
    navigator.geolocation.getCurrentPosition(
      pos => finish({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      () => finish(null), // denied, unavailable, or timed out — still check in without GPS
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  } else {
    finish(null);
  }
}
function checkOutTraining(id){
  const s = DB.trainingSessions.find(x=>x.id===id);
  s.checkOut = new Date().toISOString();
  s.durationMinutes = Math.round((new Date(s.checkOut) - new Date(s.checkIn))/60000);
  persist('trainingSessions'); renderCheckinWidget(); renderMySessionsTable(); toast('Checked out — session logged');
}
function renderMySessionsTable(){
  const t = currentTrainer();
  const wrap = document.getElementById('my-sessions-wrap');
  if(!wrap) return;
  const rows = DB.trainingSessions.filter(s=>s.trainerId===t.id).sort((a,b)=>b.checkIn.localeCompare(a.checkIn)).slice(0,15);
  wrap.innerHTML = rows.length ? `
    <table><thead><tr><th>Date</th><th>Field</th><th>Check-in</th><th>Check-out</th><th>Duration</th></tr></thead>
    <tbody>${rows.map(s=>`<tr>
      <td>${new Date(s.checkIn).toLocaleDateString()}</td>
      <td>${s.fieldOfStudy}</td>
      <td>${new Date(s.checkIn).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>
      <td>${s.checkOut ? new Date(s.checkOut).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '<span class="badge badge-amber">Active</span>'}</td>
      <td>${s.durationMinutes!=null ? formatDuration(s.durationMinutes) : '—'}</td>
    </tr>`).join('')}</tbody></table>
  ` : emptyState('No training sessions logged yet','Use Check In above when you start a training session.');
}
function formatDuration(mins){
  const h = Math.floor(mins/60), m = mins%60;
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}
function exportMySessionsCSV(){
  const t = currentTrainer();
  const rows = DB.trainingSessions.filter(s=>s.trainerId===t.id).map(s=>[
    new Date(s.checkIn).toLocaleDateString(), s.fieldOfStudy, s.checkIn, s.checkOut||'', s.durationMinutes!=null?formatDuration(s.durationMinutes):'', s.note||''
  ]);

          ${existing && existing.photo ? `<button type="button" class="btn btn-sm btn-danger" style="margin-left:6px;" onclick="window.__nfPhoto=null; document.getElementById('nf-photo-preview-wrap').innerHTML=avatarHtml(null, document.getElementById('nf-name').value, 'lg');">Remove</button>` : ''}
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group full"><label>Full name</label><input required id="nf-name" value="${existing?existing.name:''}"></div>
        <div class="form-group"><label>Phone number</label><input id="nf-phone" value="${existing?existing.phone||'':''}"></div>
        <div class="form-group"><label>Gender</label><select id="nf-gender"><option ${existing?.gender==='Male'?'selected':''}>Male</option><option ${existing?.gender==='Female'?'selected':''}>Female</option></select></div>
        <div class="form-group"><label>Age</label><input type="number" min="10" id="nf-age" value="${existing&&existing.age?existing.age:''}"></div>
        ${trainerPicker}
        <div class="form-group"><label>District</label><select id="nf-district" onchange="refreshTraineeParishes()">${dists.map(d=>`<option value="${d.id}" ${existing&&existing.districtId===d.id?'selected':''}>${d.name}</option>`).join('')}</select></div>

        <div class="form-group"><label>Enrollment date</label><input type="date" id="nf-date" value="${existing?existing.enrollmentDate:new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group full">
          <label>Fields of study — a NIEHUBee can attend more than one</label>
          <div class="checklist" id="nf-program-picker">${renderProgramPicker()}</div>
        </div>
      </div>
      <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">${id?'Save changes':'Register'}</button></div>
    </form>
  `);
  window.__nfPhoto = existing && existing.photo ? existing.photo : null;
  refreshTraineeParishes(existing ? existing.parishId : null);
}
function renderProgramPicker(){
  return FIELDS.map(f=>{
    const checked = Object.prototype.hasOwnProperty.call(programPick, f);
    return `
      <label><input type="checkbox" onchange="toggleProgramField('${f}', this.checked)" ${checked?'checked':''}> ${f}</label>
      ${checked ? `<div class="parish-sub">
        <label style="display:flex;align-items:center;gap:8px;">Status:
          <select onchange="programPick['${f}']=this.value" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;">
            ${['Enrolled','In Training','Graduated','Dropped'].map(s=>`<option value="${s}" ${programPick[f]===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </label>
      </div>` : ''}
    `;
  }).join('');
}
function toggleProgramField(field, checked){
  if(checked) programPick[field] = programPick[field] || 'Enrolled';
  else delete programPick[field];
  document.getElementById('nf-program-picker').innerHTML = renderProgramPicker();
}
function refreshTraineeParishes(preselectParishId){
  const distId = document.getElementById('nf-district').value;
  const parishes = DB.parishes.filter(p=>p.districtId===distId);
  document.getElementById('nf-parish').innerHTML = parishes.length
    ? parishes.map(p=>`<option value="${p.id}" ${preselectParishId===p.id?'selected':''}>${p.name}</option>`).join('')
    : `<option value="">—</option>`;
}
function saveTrainee(e, isOrg){
  e.preventDefault();
  const programs = Object.entries(programPick).map(([field,status])=>({field,status}));
  if(!programs.length){ toast('Select at least one field of study'); return false; }
  const data = {
    name: document.getElementById('nf-name').value.trim(),
    phone: document.getElementById('nf-phone').value.trim(),
    gender: document.getElementById('nf-gender').value,
    age: Number(document.getElementById('nf-age').value)||null,
    programs,
    districtId: document.getElementById('nf-district').value,
    parishId: document.getElementById('nf-parish').value || null,
    trainerId: isOrg ? (document.getElementById('nf-trainer').value || null) : currentTrainer().id,
    photo: window.__nfPhoto || null,
  };
  if(editingTraineeId){
    Object.assign(DB.niehubees.find(x=>x.id===editingTraineeId), data);
    toast('NIEHUBee updated');
  } else {
    DB.niehubees.push({ id: uid('ne'), ...data, enrollmentDate: document.getElementById('nf-date').value, status: 'Enrolled' });
    toast('NIEHUBee registered');
  }
  persist('niehubees'); closeModal();
  if(isOrg) renderTraineeTable(); else renderMyTraineeTable();
  return false;
}

/* ================= Locations Map (real GPS from training check-ins) ================= */
// Shows real GPS pins captured when NIEHUBers check in for training — not the
// approximate IP-based location used for Login Activity. filterTrainerId=null
// shows everyone (org view); pass a NIEHUBer's id to show only their pins.
let __activeLeafletMap = null;
function renderLocationsMapPage(filterTrainerId){
  const c = document.getElementById('content');
  const sessions = DB.trainingSessions.filter(s => s.lat!=null && s.lng!=null && (!filterTrainerId || s.trainerId===filterTrainerId));
  c.innerHTML = `
    <div class="card">
      <div id="locations-map"></div>
      <p class="map-offline-note">
        Pins mark real GPS locations captured when a NIEHUBer checked in for a training session (only sessions where location access was allowed appear here).
        Map tiles are provided by OpenStreetMap and need an internet connection to load new areas — once an area has been viewed, it stays available offline (cached automatically) until the cache is cleared.
      </p>
    </div>
  `;
  if(!window.L){ document.getElementById('locations-map').innerHTML = '<div class="empty-state">Map library failed to load — check your connection and reload.</div>'; return; }
  if(__activeLeafletMap){ __activeLeafletMap.remove(); __activeLeafletMap = null; }
  const defaultCenter = [1.3733, 32.2903]; // Uganda, roughly centered
  const map = L.map('locations-map').setView(defaultCenter, 6.3);
  __activeLeafletMap = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors'
  }).addTo(map);

  if(sessions.length){
    const markers = [];
    sessions.forEach(s=>{
      const t = DB.niehubers.find(x=>x.id===s.trainerId);
      const m = L.marker([s.lat, s.lng]).addTo(map);
      m.bindPopup(`
        <strong>${t?escapeHtml(t.name):'Unknown NIEHUBer'}</strong><br>
        ${escapeHtml(s.fieldOfStudy)}<br>
        ${new Date(s.checkIn).toLocaleString()}
        ${s.gpsAccuracy ? `<br><span style="color:#888;">±${Math.round(s.gpsAccuracy)}m accuracy</span>` : ''}
      `);
      markers.push(m);
    });
    if(markers.length > 1){
      map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2));
    } else {
      map.setView([sessions[0].lat, sessions[0].lng], 13);
    }
  }
  setTimeout(()=> map.invalidateSize(), 200); // fixes blank tiles when the map renders inside a modal/hidden tab
}
function renderOrgLocationsMap(){ renderLocationsMapPage(null); }

      return `<tr><td>${who2}</td><td>${r.date}</td><td>${r.time}</td><td>${r.deviceType}</td><td>${r.browser} · ${r.os}</td><td>${loc}</td></tr>`;
    }).join('')}</tbody></table>
    ` : emptyState('No login activity yet','Records appear here every time someone logs in.')}
  `;
}

/* ================= Training Materials (org provides, NIEHUBers view) ================= */
function renderOrgMaterials(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="card-head"><h3 style="margin:0;">Training materials</h3><button class="btn btn-primary btn-sm" onclick="openMaterialForm()">+ Add material</button></div>
    <div class="card"><div id="materials-wrap"></div></div>
  `;
  renderMaterialsTable(true);
}
function renderTrainerMaterials(){
  const c = document.getElementById('content');
  c.innerHTML = `<div class="card"><div id="materials-wrap"></div></div>`;
  renderMaterialsTable(false);
}
function renderMaterialsTable(isOrg){
  const t = isOrg ? null : currentTrainer();
  let list = DB.materials;
  if(!isOrg) list = list.filter(m => !t.fieldsOfStudy || !t.fieldsOfStudy.length || m.fieldOfStudy==='Others' || t.fieldsOfStudy.includes(m.fieldOfStudy));
  list = [...list].sort((a,b)=>b.uploadedDate.localeCompare(a.uploadedDate));
  document.getElementById('materials-wrap').innerHTML = list.length ? list.map(m=>`
    <div style="padding:14px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
        <div>
          <strong>${escapeHtml(m.title)}</strong> <span class="badge badge-grey" style="margin-left:6px;">${m.fieldOfStudy}</span>
          ${m.description ? `<p style="font-size:13px;color:var(--ink-soft);margin:6px 0 0;">${linkify(m.description)}</p>` : ''}
        </div>
        <div class="row-actions">
          ${m.fileData ? `<button class="btn btn-sm btn-primary" onclick="downloadDataUrl('${m.fileData}','${m.fileName.replace(/'/g,"")}')">Download</button>` : ''}
          ${m.linkUrl ? `<a class="btn btn-sm" href="${m.linkUrl}" target="_blank" rel="noopener">Open link</a>` : ''}
          ${isOrg ? `<button class="btn btn-sm btn-danger" onclick="deleteMaterial('${m.id}')">Delete</button>` : ''}
        </div>
      </div>
    </div>
  `).join('') : emptyState(isOrg?'No training materials yet':'No materials for your fields yet', isOrg?'Add books, guides or links per training programme.':'The organization hasn\'t shared anything for your fields of study yet.');
}
function openMaterialForm(){
  openModal('Add Training Material', `
    <form onsubmit="return saveMaterial(event)">
      <div class="form-grid">
        <div class="form-group full"><label>Title</label><input required id="mt-title"></div>
        <div class="form-group"><label>Field of study</label><select id="mt-field">${FIELDS.map(f=>`<option>${f}</option>`).join('')}</select></div>
        <div class="form-group full"><label>Description (optional)</label><textarea id="mt-desc" rows="2"></textarea></div>
        <div class="form-group full"><label>External link (optional — e.g. Google Drive / YouTube)</label><input id="mt-link" placeholder="https://..."></div>
        <div class="form-group full"><label>Or attach a small file (under 700KB)</label><input type="file" id="mt-file"></div>
      </div>
      <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" type="submit">Add material</button></div>
    </form>
  `);
}
function saveMaterial(e){
  e.preventDefault();
  const title = document.getElementById('mt-title').value.trim();
  const fieldOfStudy = document.getElementById('mt-field').value;
  const description = document.getElementById('mt-desc').value.trim();
  const linkUrl = document.getElementById('mt-link').value.trim();
  const fileInput = document.getElementById('mt-file');
  const finish = (fileData, fileName) => {
    DB.materials.push({ id: uid('mat'), title, fieldOfStudy, description, linkUrl, fileData: fileData||null, fileName: fileName||null, uploadedDate: new Date().toISOString().slice(0,10) });
    persist('materials'); closeModal(); renderMaterialsTable(true); toast('Material added');
  };
  if(fileInput.files && fileInput.files[0]){
    handleFileInput(fileInput, 700, (res)=> finish(res.data, res.name));
  } else {
    finish(null, null);
  }
  return false;
}
function deleteMaterial(id){
  const m = DB.materials.find(x=>x.id===id);
  if(!confirm(`Remove "${m.title}"?`)) return;
  DB.materials = DB.materials.filter(x=>x.id!==id);
  persist('materials'); renderMaterialsTable(true); toast('Material removed');
}

/* ================= ORG: Settings (appearance, security, org profile) ================= */
function renderTrainerCorrespondence(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="card-head"><h3 style="margin:0;">Messages</h3><button class="btn btn-primary btn-sm" onclick="openComposeForm('trainer')">+ New message</button></div>
    <div class="card" id="msg-wrap"></div>
  `;
  renderMessages(session.trainerId);
  markMessagesReadForViewer(session.trainerId);
}

function renderOrgSettings(){
  const c = document.getElementById('content');
  const s = DB.orgSettings;
  c.innerHTML = `
    <div class="card">
      <h3>Data storage status</h3>
      ${storageStatusBanner()}
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0;">This determines whether your team sees the same NIEHUBers, NIEHUBees, and payments no matter which device or browser they use.</p>
    </div>
    <div class="card">
      <h3>Organization profile</h3>
      <div class="avatar-upload-wrap">
        <div id="org-logo-preview-wrap">${avatarHtml(s.logo, s.name, 'lg')}</div>
        <div>
          <label class="field-label">Logo / photo</label>
          <input type="file" accept="image/*" onchange="handlePhotoInput(this, function(url){ DB.orgSettings.logo=url; DB.orgSettings.photo=url; persist('orgSettings'); document.getElementById('org-logo-preview-wrap').innerHTML=avatarHtml(url, DB.orgSettings.name, 'lg'); renderSidebar(); toast('Logo updated'); })">
          ${s.logo ? `<button class="btn btn-sm btn-danger" style="margin-left:6px;" onclick="removeOrgPhoto()">Remove</button>` : ''}
        </div>
      </div>
      <div class="form-group full" style="margin-top:14px;"><label>Organization / academy name</label>
        <input id="os-name" value="${s.name}" onchange="saveOrgName(this.value)">
      </div>
    </div>

    <div class="card">
      <h3>Appearance</h3>
      <div class="form-grid">
        <div class="form-group"><label>Primary color</label>
          <div class="color-row"><input type="color" id="os-primary" value="${s.primaryColor}"><span style="font-size:12.5px;color:var(--ink-soft);">Buttons, sidebar, highlights</span></div>
        </div>
        <div class="form-group"><label>Accent color</label>
          <div class="color-row"><input type="color" id="os-amber" value="${s.amberColor}"><span style="font-size:12.5px;color:var(--ink-soft);">Allowances & highlights</span></div>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:14px;" onclick="saveAppearance()">Save appearance</button>
    </div>

    <div class="card">
      <h3>Organization password</h3>
      <p style="font-size:12.5px;color:var(--ink-soft);margin-top:-6px;">Used to log in as the Organization.</p>
      <div class="form-grid">
        <div class="form-group"><label>Current password</label><input type="password" id="os-cur-pw"></div>
        <div class="form-group"><label>New password</label><input type="password" id="os-new-pw"></div>
      </div>
      <div id="os-pw-msg"></div>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="changeOrgPassword()">Update password</button>
    </div>
  `;
}
function saveOrgName(val){
  DB.orgSettings.name = val.trim() || DEFAULT_ORG_SETTINGS.name;
  persist('orgSettings'); applyAppearance(); renderSidebar(); toast('Organization name updated');
}
function saveAppearance(){
  DB.orgSettings.primaryColor = document.getElementById('os-primary').value;
  DB.orgSettings.amberColor = document.getElementById('os-amber').value;
  persist('orgSettings'); applyAppearance(); toast('Appearance updated');
}
function changeOrgPassword(){
  const cur = document.getElementById('os-cur-pw').value;
  const next = document.getElementById('os-new-pw').value;
  const msg = document.getElementById('os-pw-msg');
  if(cur !== DB.orgSettings.password){ msg.innerHTML = `<div class="login-error">Current password is incorrect.</div>`; return; }
  if(!next || next.length < 4){ msg.innerHTML = `<div class="login-error">New password must be at least 4 characters.</div>`; return; }
  DB.orgSettings.password = next;
  persist('orgSettings');
  msg.innerHTML = '';
  document.getElementById('os-cur-pw').value = ''; document.getElementById('os-new-pw').value = '';
  toast('Organization password updated');
}

/* ================= TRAINER: My Profile ================= */
function renderTrainerProfile(){
  const t = currentTrainer();
  const c = document.getElementById('content');
  const dists = (t.districtIds||[]).map(id=>DB.districts.find(d=>d.id===id)?.name).filter(Boolean);
  c.innerHTML = `
    <div class="card">
      <h3>My photo</h3>
      <div class="avatar-upload-wrap">
        <div id="my-photo-preview-wrap">${avatarHtml(t.photo, t.name, 'lg')}</div>
        <div>
          <label class="field-label">Profile picture</label>
          <input type="file" accept="image/*" onchange="handlePhotoInput(this, function(url){ t.photo=url; persist('niehubers'); document.getElementById('my-photo-preview-wrap').innerHTML=avatarHtml(url,t.name,'lg'); renderSidebar(); toast('Profile picture updated'); })">
          ${t.photo ? `<button class="btn btn-sm btn-danger" style="margin-left:6px;" onclick="removeMyPhoto()">Remove photo</button>` : ''}
        </div>
      </div>
    </div>
    <div class="card">
      <h3>My details</h3>
      <div class="form-grid">
        <div class="form-group"><label>Name</label><input value="${t.name}" disabled></div>
        <div class="form-group"><label>Phone</label><input value="${t.phone||''}" disabled></div>
        <div class="form-group"><label>Fields of study</label><input value="${(t.fieldsOfStudy||[]).join(', ')||'—'}" disabled></div>
        <div class="form-group"><label>Districts</label><input value="${dists.join(', ')||'—'}" disabled></div>
      </div>
      <p style="font-size:12px;color:var(--ink-soft);margin-top:10px;margin-bottom:0;">To update these details, contact the organization.</p>
    </div>
    <div class="card">
      <h3>Change password</h3>
      <div class="form-grid">
        <div class="form-group"><label>Current password</label><input type="password" id="tp-cur-pw"></div>
        <div class="form-group"><label>New password</label><input type="password" id="tp-new-pw"></div>
      </div>
      <div id="tp-pw-msg"></div>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="changeTrainerPassword()">Update password</button>
    </div>
  `;
}
function changeTrainerPassword(){
  const t = currentTrainer();
  const cur = document.getElementById('tp-cur-pw').value;
  const next = document.getElementById('tp-new-pw').value;
  const msg = document.getElementById('tp-pw-msg');
  if(cur !== (t.password||'2026')){ msg.innerHTML = `<div class="login-error">Current password is incorrect.</div>`; return; }
  if(!next || next.length < 4){ msg.innerHTML = `<div class="login-error">New password must be at least 4 characters.</div>`; return; }
  t.password = next;
  persist('niehubers');
  msg.innerHTML = '';
  document.getElementById('tp-cur-pw').value=''; document.getElementById('tp-new-pw').value='';
  toast('Password updated');
}
</script>
